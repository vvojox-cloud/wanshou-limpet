name: 每日網站點擊統計

on:
  schedule:
    - cron: '50 23 * * *'  # UTC 23:50 = 台北 07:50
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 讀取 Sheets 統計並發送 LINE
        env:
          SHEET_ID: 1kHLvEJPhh2qIhgNOtXTPtGO0RnnoIuth3rTV0chN09I
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          YESTERDAY=$(TZ='Asia/Taipei' date -d 'yesterday' +%Y-%m-%d)
          YESTERDAY_DISPLAY=$(TZ='Asia/Taipei' date -d 'yesterday' +'%m/%d (%a)')

          # 讀取 Google Sheets
          SHEET_DATA=$(curl -s \
            "https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/%E5%B7%A5%E4%BD%9C%E8%A1%A81?key=${GOOGLE_API_KEY}")

          # 用 jq 統計昨天各事件數量
          STATS=$(echo "$SHEET_DATA" | jq -r --arg date "$YESTERDAY" '
            .values[1:] // [] |
            map(select(length > 0 and .[0] != null and (.[0] | startswith($date)))) |
            {
              total:      length,
              line_click: map(select(.[2] == "line_click")) | length,
              species:    map(select(.[2] == "species_click")) | length,
              weather:    map(select(.[3] == "天氣動態")) | length,
              collection: map(select(.[3] == "採集方式")) | length,
              recipe:     map(select(.[3] == "笠螺料理")) | length,
              history:    map(select(.[3] == "採集歷史")) | length,
              activity:   map(select(.[2] == "activity_click")) | length,
              travel:     map(select(.[2] == "trip_popup_open")) | length,
              session:    map(select(.[2] == "session_start")) | length
            }
          ')

          TOTAL=$(echo "$STATS" | jq -r '.total')
          LINE_CLICK=$(echo "$STATS" | jq -r '.line_click')
          SPECIES=$(echo "$STATS" | jq -r '.species')
          WEATHER=$(echo "$STATS" | jq -r '.weather')
          COLLECTION=$(echo "$STATS" | jq -r '.collection')
          RECIPE=$(echo "$STATS" | jq -r '.recipe')
          HISTORY=$(echo "$STATS" | jq -r '.history')
          ACTIVITY=$(echo "$STATS" | jq -r '.activity')
          TRAVEL=$(echo "$STATS" | jq -r '.travel')
          SESSION=$(echo "$STATS" | jq -r '.session')

          MESSAGE=$(printf "📊 萬壽網站昨日統計\n📅 %s\n訪客數：%s 人\n\n📱 頁面瀏覽：\n🌤 天氣動態：%s 次\n🪨 採集方式：%s 次\n🍽 笠螺料理：%s 次\n📜 採集歷史：%s 次\n📅 活動進程：%s 次\n\n🎯 互動功能：\n💬 LINE 報名：%s 次\n🐚 物種辨識：%s 次\n🎉 小旅行彈窗：%s 次\n\n總互動：%s 次\n📊 https://vvojox-cloud.github.io/wanshou-limpet/admin-stats.html" \
            "$YESTERDAY_DISPLAY" "$SESSION" \
            "$WEATHER" "$COLLECTION" "$RECIPE" "$HISTORY" "$ACTIVITY" \
            "$LINE_CLICK" "$SPECIES" "$TRAVEL" \
            "$TOTAL")

          curl -s -X POST 'https://api.line.me/v2/bot/message/push' \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg to "$LINE_USER_ID" \
              --arg text "$MESSAGE" \
              '{to: $to, messages: [{type: "text", text: $text}]}')"

          echo "✅ 每日統計發送完成（昨日總計 ${TOTAL} 次互動）"
