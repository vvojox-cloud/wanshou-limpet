name: 每日金山潮汐 LINE 日報

on:
  schedule:
    - cron: '30 23 * * *'  # UTC 23:30 = 台北 07:30（離峰，確保準時送達）
  workflow_dispatch:

jobs:
  send-tide-report:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取 CWA 並發送 LINE
        env:
          CWA_KEY: CWA-1026E4AC-395E-4FAA-968D-54C85BCE7D56
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          TODAY=$(TZ='Asia/Taipei' date +%Y-%m-%d)
          TODAY_DISPLAY=$(TZ='Asia/Taipei' date +'%m/%d (%a)')

          CWA_DATA=$(curl -s "https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${CWA_KEY}&format=JSON&locationName=%E9%87%91%E5%B1%B1")

          TIDE_TEXT=$(echo "$CWA_DATA" | jq -r --arg today "$TODAY" '
            .records.TideForecasts[1].Location.TimePeriods.Daily[]
            | select(.Date == $today)
            | .Time[]
            | (if .Tide == "滿潮" then "▲ 滿潮" else "▼ 乾潮" end)
              + " " + (.DateTime | split("T")[1] | split("+")[0] | split(":")[0:2] | join(":"))
              + "　" + (.TideHeights.AboveLocalMSL | tostring) + " cm"
          ')

          if [ -z "$TIDE_TEXT" ]; then
            echo "❌ 無法取得今日潮汐"
            exit 1
          fi

          MESSAGE=$(printf "🌊 金山中角灣潮汐日報\n📅 %s\n\n%s\n\n⚓ 基準：相對當地平均海面\n📊 https://vvojox-cloud.github.io/wanshou-limpet/admin-stats.html" "$TODAY_DISPLAY" "$TIDE_TEXT")

          curl -X POST 'https://api.line.me/v2/bot/message/push' \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg to "$LINE_USER_ID" --arg text "$MESSAGE" '{
              to: $to,
              messages: [{type: "text", text: $text}]
            }')"

          echo "✅ LINE 發送完成"
