<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮間帶生物圖鑑｜萬壽社區</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<style>
  :root {
    --navy: #0d2b4e;
    --navy-mid: #1a4a7a;
    --navy-light: #1e5a8e;
    --coral: #e8825a;
    --coral-light: #f0a882;
    --algae: #2ecc8e;
    --algae-dim: #1aaa70;
    --text-bright: #f0f6ff;
    --text-dim: #a8c0d8;
    --card-bg: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: system-ui, -apple-system, sans-serif; 
    background: var(--navy); 
    color: var(--text-bright); 
    padding-bottom: 90px; 
    min-height: 100vh;
  }

  /* ── Header ── */
  .header { 
    background: linear-gradient(180deg, #0a1f38 0%, var(--navy) 100%);
    padding: 20px 16px 12px; 
    text-align: center; 
    border-bottom: 1px solid var(--card-border);
  }
  .header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 4px; }
  .header p { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.05em; }

  /* ── 搜尋與篩選列 ── */
  .search-bar { padding: 12px 16px; display: flex; gap: 8px; }
  .search-bar input { 
    flex: 1; padding: 10px 14px; border-radius: 20px; 
    background: rgba(255,255,255,0.1); color: var(--text-bright);
    border: 1px solid var(--card-border); font-size: 0.95rem; outline: none; 
  }
  .search-bar input::placeholder { color: var(--text-dim); }
  
  .filter-bar { display: flex; gap: 8px; padding: 4px 16px 12px; overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { 
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--card-border); 
    background: var(--card-bg); font-size: 0.85rem; cursor: pointer; 
    white-space: nowrap; color: var(--text-dim); transition: all 0.2s;
  }
  .filter-btn.active { background: var(--coral); color: white; border-color: var(--coral); }

  .stats { text-align: center; padding: 4px 8px 12px; font-size: 0.75rem; color: var(--text-dim); }

  /* ── 生物卡片 ── */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px 16px; max-width: 640px; margin: 0 auto; }
  .card { background: var(--card-bg); border-radius: 14px; overflow: hidden; border: 1px solid var(--card-border); cursor: pointer; }
  .card.danger { border-color: #ef4444; }
  .card-img { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 12px; }
  .card-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; color: var(--text-bright); }
  .card-latin { font-size: 0.7rem; color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
  
  .badge { display: inline-block; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: 600; }
  .badge-harvest { background: rgba(46,204,142,0.15); color: var(--algae); border: 1px solid var(--algae); }
  .badge-no { background: rgba(255,255,255,0.1); color: var(--text-dim); border: 1px solid var(--text-dim); }
  .badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }

  /* ── 底部導覽列 ── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,30,55,0.97); backdrop-filter: blur(12px); border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; align-items: center; padding: 8px 0 12px; z-index: 90; }
  .bnav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: var(--text-dim); font-size: 0.65rem; padding: 4px 8px; border: none; background: none; cursor: pointer; }
  .bnav-item.active { color: var(--coral-light); }
  .bnav-icon { font-size: 1.35rem; line-height: 1; }

  /* ── 生物詳細 Modal ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--navy); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; border-top: 1px solid var(--card-border); }
  .modal-img { width: 100%; height: 250px; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 60px; overflow: hidden; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; }
  .modal-body { padding: 20px; }
  .modal-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; color: var(--coral-light); }
  .modal-latin { font-size: 0.8rem; color: var(--text-dim); font-style: italic; margin-bottom: 16px; }
  .modal-section { margin-bottom: 16px; }
  .modal-label { font-size: 0.75rem; font-weight: 700; color: var(--algae); margin-bottom: 6px; }
  .modal-text { font-size: 0.9rem; line-height: 1.6; color: var(--text-bright); }
  .modal-rule { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px; font-size: 0.85rem; line-height: 1.6; color: var(--text-bright); }
  .modal-rule.danger-rule { background: rgba(239,68,68,0.1); border-color: #ef4444; color: #fca5a5; font-weight: 600; }
  .close-btn { display: block; width: calc(100% - 40px); margin: 0 20px 24px; padding: 14px; background: rgba(255,255,255,0.1); color: var(--text-bright); border: 1px solid var(--card-border); border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; }

  /* ── AI 辨識面板 ── */
  .ai-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; align-items: flex-end; justify-content: center; }
  .ai-bg.open { display: flex; }
  .ai-panel { background: var(--navy); border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; padding: 24px 20px; max-height: 95vh; overflow-y: auto; border-top: 1px solid var(--card-border); }
  
  .model-status { background: rgba(46,204,142,0.1); border: 1px solid var(--algae); border-radius: 10px; padding: 10px 14px; margin: 12px 0; font-size: 0.8rem; color: var(--algae); display: flex; align-items: center; gap: 8px; }
  .model-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .model-dot.ready { background: var(--algae); }
  .model-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .ai-url-bar { background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); border-radius: 10px; padding: 10px; margin-bottom: 16px; display: flex; gap: 6px; align-items: center; }
  .ai-url-bar input { flex: 1; border: none; background: transparent; font-size: 0.8rem; color: var(--text-bright); outline: none; }
  
  .ai-preview { width: 100%; aspect-ratio: 4/3; background: rgba(0,0,0,0.3); border-radius: 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 50px; color: var(--card-border); border: 1px dashed var(--card-border); }
  .ai-preview img { width: 100%; height: 100%; object-fit: cover; }
  
  .ai-photo-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .ai-btn-camera { padding: 16px 8px; background: var(--coral); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .ai-btn-gallery { padding: 16px 8px; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-bright); border-radius: 12px; font-size: 1rem; cursor: pointer; }
  .ai-btn-submit { width: 100%; padding: 16px; background: var(--algae); color: var(--navy); border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
  .ai-btn-submit:disabled { opacity: 0.4; cursor: not-allowed; background: var(--text-dim); }
  .ai-btn-close { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--card-border); border-radius: 12px; font-size: 1rem; cursor: pointer; color: var(--text-dim); }

  /* 載入動畫 */
  .ai-loading { display: none; flex-direction: column; align-items: center; padding: 24px 16px; margin-bottom: 16px; background: rgba(46,204,142,0.05); border: 1px solid var(--card-border); border-radius: 14px; gap: 16px; }
  .wave-bar { width: 8px; border-radius: 4px; background: var(--algae); animation: wave 1.2s ease-in-out infinite; }
  .wave-container { display: flex; gap: 6px; align-items: flex-end; height: 40px; }
  .wave-bar:nth-child(1){animation-delay:0s;height:20px} .wave-bar:nth-child(2){animation-delay:.15s;height:32px} .wave-bar:nth-child(3){animation-delay:.3s;height:40px} .wave-bar:nth-child(4){animation-delay:.45s;height:32px} .wave-bar:nth-child(5){animation-delay:.6s;height:20px} .wave-bar:nth-child(6){animation-delay:.75s;height:32px} .wave-bar:nth-child(7){animation-delay:.9s;height:40px}
  @keyframes wave { 0%,100%{transform:scaleY(.4);opacity:.5} 50%{transform:scaleY(1);opacity:1} }
  .loading-text { font-size: 1rem; font-weight: 700; color: var(--algae); text-align: center; }
  .loading-sub { font-size: 0.8rem; color: var(--text-dim); text-align: center; margin-top: -8px; }

  /* 辨識結果 */
  .ai-result { display: none; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .ai-result.success { background: rgba(46,204,142,0.1); border: 1px solid var(--algae); }
  .ai-result.warning { background: rgba(250,204,21,0.1); border: 1px solid #fbbf24; }
  .ai-result.danger-result { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; }
  
  .ai-result-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
  .ai-result-latin { font-size: 0.8rem; color: var(--text-dim); font-style: italic; margin-bottom: 12px; }
  .ai-result-desc { font-size: 0.9rem; color: var(--text-bright); margin-bottom: 12px; line-height: 1.6; }

  /* 信心度條 */
  .confidence-bar { margin: 10px 0 12px; }
  .confidence-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
  .confidence-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .confidence-fill.high { background: var(--algae); }
  .confidence-fill.mid { background: #fbbf24; }
  .confidence-fill.low { background: #ef4444; }

  /* 阿超說話框 */
  .chaoshao-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 14px; border: 1px solid var(--coral-light); margin-bottom: 8px; }
  .chaoshao-box.danger-box { border-color: #ef4444; background: rgba(239,68,68,0.1); }
  .chaoshao-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .chaoshao-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--coral); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .chaoshao-name { font-size: 0.85rem; font-weight: 700; color: var(--coral-light); }
  .chaoshao-title { font-size: 0.7rem; color: var(--text-dim); }
  .chaoshao-msg { font-size: 0.9rem; line-height: 1.7; color: var(--text-bright); }
  .chaoshao-msg.danger-msg { color: #fca5a5; font-weight: 600; }

  /* 通用標籤 */
  .tag { display: inline-block; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; margin-right: 4px; margin-bottom: 4px; font-weight: 600;}
  .tag-green { background: rgba(46,204,142,0.15); color: var(--algae); border: 1px solid var(--algae); }
  .tag-red { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }
  .tag-gray { background: rgba(255,255,255,0.1); color: var(--text-dim); border: 1px solid var(--text-dim); }
  .tag-yellow { background: rgba(250,204,21,0.15); color: #fbbf24; border: 1px solid #fbbf24; }
  .tag-blue { background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid #38bdf8; }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 潮間帶生物圖鑑</h1>
  <p>中角灣常見物種 · 萬壽社區發展協會</p>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜尋物種名稱..." oninput="filterSpecies()">
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('全部',this)">全部</button>
  <button class="filter-btn" onclick="setFilter('笠螺類',this)">🐚 笠螺</button>
  <button class="filter-btn" onclick="setFilter('鐘螺類',this)">🐌 鐘螺</button>
  <button class="filter-btn" onclick="setFilter('寶螺類',this)">✨ 寶螺</button>
  <button class="filter-btn" onclick="setFilter('可採集',this)">✅ 可採集</button>
  <button class="filter-btn" onclick="setFilter('注意危險',this)">⚠️ 注意</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<!-- 底部導覽列 -->
<nav class="bottom-nav">
  <a href="index.html" class="bnav-item">
    <span class="bnav-icon">🐚</span>首頁
  </a>
  <a href="species.html" class="bnav-item active">
    <span class="bnav-icon">🔍</span>圖鑑
  </a>
  <a href="activity.html" class="bnav-item">
    <span class="bnav-icon">📅</span>活動進程
  </a>
  <a href="guide-volunteer.html" class="bnav-item">
    <span class="bnav-icon">📖</span>手冊
  </a>
  <a href="admin.html" class="bnav-item">
    <span class="bnav-icon">🎛️</span>主持人
  </a>
</nav>

<!-- 生物詳細 Modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-img" id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-latin" id="modalLatin"></div>
      <div class="modal-section">
        <div class="modal-label">棲息環境</div>
        <div class="modal-text" id="modalHabitat"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">物種介紹</div>
        <div class="modal-text" id="modalDesc"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">採集守則</div>
        <div id="modalRule"></div>
      </div>
    </div>
    <button class="close-btn" onclick="closeModal()">關閉</button>
  </div>
</div>

<!-- 圖鑑頁：右下角辨識按鈕 (觸發 openAI) -->
<div onclick="openAI()" style="
  position:fixed;bottom:100px;right:16px;z-index:80;
  background:#1a6b4a;color:white;
  border-radius:16px 16px 4px 16px;
  padding:14px 16px;max-width:185px;
  font-size:16px;font-weight:700;line-height:1.5;
  box-shadow:0 4px 16px rgba(0,0,0,0.35);cursor:pointer;">
  📷 拍下生物照片<br>
  <span style="font-size:13px;font-weight:400;opacity:0.9;">我來幫您辨識物種！</span>
</div>

<!-- AI 辨識面板 -->
<div class="ai-bg" id="aiBg" onclick="closeAI(event)">
  <div class="ai-panel">
    <h2 style="font-size:1.2rem;margin-bottom:4px;color:var(--text-bright);">📷 AI 生物辨識</h2>
    <p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:12px;">拍照辨識，由阿超海洋學家為您解說</p>

    <!-- 模型狀態 -->
    <div class="model-status">
      <div class="model-dot" id="modelDot"></div>
      <span id="modelStatusText">AI 模型載入中...</span>
    </div>

    <!-- AI 網址設定 -->
    <div class="ai-url-bar">
      <span style="font-size:0.75rem;color:var(--text-dim);white-space:nowrap;">🌐 Gemma：</span>
      <input id="aiUrlInput" type="text"
        placeholder="貼上 ngrok 網址啟用深度分析"
        oninput="saveAiUrl(this.value)">
      <span id="aiUrlStatus" style="font-size:0.7rem;color:var(--algae);white-space:nowrap;">未連線</span>
    </div>

    <!-- 預覽區 -->
    <div class="ai-preview" id="aiPreview">🐚</div>

    <!-- 拍照 / 選圖 -->
    <div class="ai-photo-btns">
      <button class="ai-btn-camera" onclick="document.getElementById('aiCamera').click()">📷 拍照</button>
      <button class="ai-btn-gallery" onclick="document.getElementById('aiGallery').click()">🖼️ 從相簿選</button>
    </div>
    <input type="file" id="aiCamera" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
    <input type="file" id="aiGallery" accept="image/*" style="display:none" onchange="previewImage(this)">

    <button class="ai-btn-submit" id="aiSubmitBtn" onclick="submitAI()" disabled>🔍 開始辨識</button>

    <!-- 載入動畫 -->
    <div class="ai-loading" id="aiLoading">
      <div style="font-size: 32px; animation: spin 2s linear infinite;">🐚</div>
      <div class="wave-container">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div class="loading-text">阿超正在幫您辨識...</div>
      <div class="loading-sub" id="loadingSubText">TM 模型分析中</div>
    </div>

    <!-- 辨識結果 -->
    <div class="ai-result" id="aiResult">
      <div class="ai-result-name" id="aiResultName"></div>
      <div class="ai-result-latin" id="aiResultLatin"></div>
      <div class="confidence-bar">
        <div class="confidence-label" id="confLabel"></div>
        <div class="confidence-track">
          <div class="confidence-fill" id="confFill"></div>
        </div>
      </div>
      <div class="ai-result-desc" id="aiResultDesc"></div>
      <!-- 阿超說話框 -->
      <div class="chaoshao-box" id="chaoshaoBox">
        <div class="chaoshao-header">
          <div class="chaoshao-avatar">🧑‍🔬</div>
          <div>
            <div class="chaoshao-name">阿超海洋學家</div>
            <div class="chaoshao-title">中角灣潮間帶研究 30 年</div>
          </div>
        </div>
        <div class="chaoshao-msg" id="chaoshaoMsg"></div>
      </div>
    </div>

    <button class="ai-btn-close" onclick="closeAI()">關閉返回圖鑑</button>
  </div>
</div>

<script>
const MODEL_URL = './model/';
let tmModel = null;
let selectedImage = null;
let allSpecies = [];
let currentFilter = '全部';

const categoryEmoji = {
  '笠螺類':'🐚', '蜑螺類':'🐌', '鐘螺類':'🐌',
  '岩螺類':'🐚', '芋螺類':'⚠️', '寶螺類':'✨'
};

const TM_PERSONALITY = {
  '花笠螺':    '你看你看！這是我們的「苦丕仔」！黃綠色殼面，沒有放射紋的那種。苦中帶甘，老饕才懂這味道！3公分以上才能採喔！',

  '珠螺':      '你看你看！把牠翻過來，殼口有沒有藍綠色的珍珠光澤？漂亮吧！',
  '黑鐘螺':    '這是黑鐘螺！黑色錐形，表面有小顆粒，感覺像釋迦皮。',
  '草蓆鐘螺':  '哎！草蓆鐘螺！你看那個顆粒排列，真的很像草蓆編出來的。',
  '岩螺':      '這是岩螺！菱形的殼，有疣狀突起。',
  '織錦芋螺':  '🚨 這個厲害了，但是要小心！織錦芋螺！有神經毒素！花紋再漂亮也不能碰！立刻告知講師！保持距離！',
  '黃寶螺':    '哎呦！黃寶螺！古代用來當錢幣的！現在很稀有了，好好欣賞，輕輕放回去！',
  '阿拉伯寶螺': '你看你看！阿拉伯寶螺！殼面的花紋像阿拉伯文字，很神奇吧！中角灣的稀客，觀察後輕輕放回原位喔！',
};

async function loadModel() {
  try {
    document.getElementById('modelDot').className = 'model-dot loading';
    document.getElementById('modelStatusText').textContent = 'AI 模型載入中...';
    tmModel = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
    document.getElementById('modelDot').className = 'model-dot ready';
    document.getElementById('modelStatusText').textContent = '✓ AI 模型就緒，可以開始辨識';
  } catch(e) {
    document.getElementById('modelDot').className = 'model-dot';
    document.getElementById('modelStatusText').textContent = '模型載入失敗，請確認檔案路徑';
    console.error('模型載入失敗：', e);
  }
}

function initAiUrl() {
  const params = new URLSearchParams(window.location.search);
  const urlParam = params.get('ai');
  if (urlParam) {
    const clean = urlParam.trim().replace(/\/$/, '');
    localStorage.setItem('aiServerUrl', clean);
    document.getElementById('aiUrlInput').value = clean;
    document.getElementById('aiUrlStatus').textContent = '✓ 已連線';
  } else {
    const saved = localStorage.getItem('aiServerUrl');
    if (saved) {
      document.getElementById('aiUrlInput').value = saved;
      document.getElementById('aiUrlStatus').textContent = '✓ 已連線';
    }
  }
}

function saveAiUrl(val) {
  const clean = val.trim().replace(/\/$/, '');
  if (clean.startsWith('http')) {
    localStorage.setItem('aiServerUrl', clean);
    document.getElementById('aiUrlStatus').textContent = '✓ 已儲存';
  } else if (clean === '') {
    localStorage.removeItem('aiServerUrl');
    document.getElementById('aiUrlStatus').textContent = '未連線';
  }
}

fetch('species.json')
  .then(r => r.json())
  .then(data => { allSpecies = data; renderGrid(data); });

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterSpecies();
}

function filterSpecies() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = allSpecies;
  if (currentFilter === '可採集') list = list.filter(s => s.canHarvest);
  else if (currentFilter === '注意危險') list = list.filter(s => s.danger);
  else if (currentFilter !== '全部') list = list.filter(s => s.category === currentFilter);
  if (q) list = list.filter(s => s.name.includes(q) || s.latinName.toLowerCase().includes(q));
  renderGrid(list);
}

function renderGrid(list) {
  document.getElementById('stats').textContent = `共找到 ${list.length} 種生物`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  list.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card' + (s.danger ? ' danger' : '');
    card.onclick = () => openModal(s);
    const badge = s.canHarvest
      ? `<span class="badge badge-harvest">✅ 可採集</span>`
      : s.danger ? `<span class="badge badge-danger">⚠️ 注意危險</span>`
      : `<span class="badge badge-no">僅供觀賞</span>`;
    card.innerHTML = `
      <div class="card-img">
        <img src="${s.image}" alt="${s.name}"
          onerror="this.parentElement.innerHTML='<span>${categoryEmoji[s.category]||'🐾'}</span>'">
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-latin">${s.latinName}</div>
        ${badge}
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(s) {
  document.getElementById('modalImg').innerHTML =
    `<img src="${s.image}" alt="${s.name}"
      onerror="this.parentElement.innerHTML='<span style=\\'font-size:60px\\'>${categoryEmoji[s.category]||'🐾'}</span>'">`;
  document.getElementById('modalName').textContent = s.name;
  document.getElementById('modalLatin').textContent = s.latinName;
  document.getElementById('modalHabitat').textContent = s.habitat;
  document.getElementById('modalDesc').textContent = s.desc;
  document.getElementById('modalRule').innerHTML =
    `<div class="modal-rule ${s.danger?'danger-rule':''}">${s.rule}</div>`;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBg'))
    document.getElementById('modalBg').classList.remove('open');
}

function openAI() {
  selectedImage = null;
  document.getElementById('aiPreview').innerHTML = '🐚';
  document.getElementById('aiSubmitBtn').disabled = true;
  document.getElementById('aiLoading').style.display = 'none';
  document.getElementById('aiResult').style.display = 'none';
  document.getElementById('aiBg').classList.add('open');
  initAiUrl();
}

function closeAI(e) {
  if (!e || e.target === document.getElementById('aiBg'))
    document.getElementById('aiBg').classList.remove('open');
}

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selectedImage = e.target.result;
    document.getElementById('aiPreview').innerHTML = `<img src="${selectedImage}" id="previewImg">`;
    document.getElementById('aiSubmitBtn').disabled = false;
    document.getElementById('aiLoading').style.display = 'none';
    document.getElementById('aiResult').style.display = 'none';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function showResult(name, latinName, confidence, confPct, desc, chaoshaoMsg, isDanger, method, localName, similarity) {
  const resultEl = document.getElementById('aiResult');
  resultEl.className = 'ai-result ' + (isDanger ? 'danger-result' : confidence === '低' ? 'warning' : 'success');

  const harvestBadge = name === '無法辨識' ? '' :
    isDanger
      ? '<span class="tag tag-red">⚠️ 危險</span>'
      : allSpecies.find(s => s.name === name)?.canHarvest
        ? '<span class="tag tag-green">✅ 可採集</span>'
        : '<span class="tag tag-gray">僅供觀賞</span>';

  const localTag = localName ? `<span class="tag tag-yellow">🏡 ${localName}</span>` : '';
  const methodTag = method ? `<span class="tag tag-blue">🤖 ${method}</span>` : '';
  const simTag = similarity ? `<span class="tag tag-blue">相似度 ${similarity}</span>` : '';

  document.getElementById('aiResultName').innerHTML =
    `${name}<br><span style="font-size:12px;display:inline-block;margin-top:6px;">${harvestBadge}${localTag}${methodTag}${simTag}</span>`;
  document.getElementById('aiResultLatin').textContent = latinName || '';

  const fill = document.getElementById('confFill');
  fill.style.width = confPct + '%';
  fill.className = 'confidence-fill ' + (confPct >= 80 ? 'high' : confPct >= 50 ? 'mid' : 'low');
  document.getElementById('confLabel').textContent =
    `${confidence === '高' ? '高信心度' : confidence === '中' ? '中信心度' : '低信心度'}：${confPct}%`;

  document.getElementById('aiResultDesc').textContent = desc || '';

  const box = document.getElementById('chaoshaoBox');
  box.className = 'chaoshao-box' + (isDanger ? ' danger-box' : '');
  const msg = document.getElementById('chaoshaoMsg');
  msg.className = 'chaoshao-msg' + (isDanger ? ' danger-msg' : '');
  msg.textContent = chaoshaoMsg || '阿超正在思考中...';

  resultEl.style.display = 'block';
}

async function submitAI() {
  if (!selectedImage) return;

  const btn = document.getElementById('aiSubmitBtn');
  btn.textContent = '⏳ 辨識中...';
  btn.disabled = true;
  document.getElementById('aiLoading').style.display = 'flex';
  document.getElementById('aiResult').style.display = 'none';

  const aiUrl = localStorage.getItem('aiServerUrl');

  if (aiUrl) {
    try {
      document.getElementById('loadingSubText').textContent = 'Gemma 深度分析 + 阿超解說中...';
      const res = await fetch(aiUrl + '/identify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
        body: JSON.stringify({ image: selectedImage }),
        signal: AbortSignal.timeout(90000)
      });
      const data = await res.json();
      if (data && data.name && data.name !== '辨識失敗') {
        const confPct = data.confidence === '高' ? 92 : data.confidence === '中' ? 65 : 35;
        const chaoshaoMsg = data.personality_msg || TM_PERSONALITY[data.name] || `這是${data.name}，${data.description}`;
        document.getElementById('aiLoading').style.display = 'none';
        showResult(data.name, data.latinName, data.confidence, confPct, data.description, chaoshaoMsg, data.danger, data.method, data.local_name, data.similarity);
        btn.textContent = '🔍 開始辨識';
        btn.disabled = false;
        return;
      }
    } catch(e) {
      console.log('Gemma 服務無法連線，改用 TM 本地模型', e);
      document.getElementById('loadingSubText').textContent = 'TM 本地模型分析中...';
    }
  }

  try {
    document.getElementById('loadingSubText').textContent = 'TM 本地模型分析中...';
    if (!tmModel) throw new Error('模型尚未載入，請稍候再試');

    const imgEl = document.getElementById('previewImg');
    if (!imgEl) throw new Error('找不到圖片');

    const predictions = await tmModel.predict(imgEl);
    const best = predictions.reduce((a, b) => a.probability > b.probability ? a : b);
    const confidence = best.probability;
    const label = best.className.trim();
    const confPct = Math.round(confidence * 100);
    const confLevel = confidence >= 0.8 ? '高' : confidence >= 0.5 ? '中' : '低';

    const speciesData = allSpecies.find(s => s.name === label);
    const desc = speciesData?.desc || '';
    const isDanger = speciesData?.danger || false;
    const chaoshaoMsg = confidence < 0.5
      ? `哎呦！這張照片讓阿超我有點拿不準。看起來可能是${label}，但信心不足。靠近一點，側面角度拍，我給你更準確的答案！`
      : TM_PERSONALITY[label] || `這是${label}，請對照圖鑑確認。`;

    document.getElementById('aiLoading').style.display = 'none';
    showResult(label, speciesData?.latinName || '', confLevel, confPct, desc, chaoshaoMsg, isDanger, 'TM本地模型', '', '');
  } catch(err) {
    document.getElementById('aiLoading').style.display = 'none';
    showResult('辨識失敗', '', '低', 0, err.message || '請重新整理後再試', '哎呦！阿超我也有出錯的時候。請重新拍一張，側面角度，靠近一點！', false, '', '', '');
  }

  btn.textContent = '🔍 開始辨識';
  btn.disabled = false;
}

loadModel();
initAiUrl();
</script>
</body>
